---
- name: setup catalogue
  hosts: catalogue
  become: yes
  tasks:
  - name: disabling the node 20 version
    command: dnf module disable nodejs -y
  
  - name: installing node js
    dnf:
      name: nodejs
      state: present
  
  - name: creating system user
    user:
      name: roboshop
      state: present
      system: true
      shell: /sbin/nologin
      comment: "ROboshop system user"
  
  - name: create app directory
    file:
      path: /app
      state: directory
  
  - name: downlaod catalogue
    get_url:
      url: /tmp/catalogue.zip https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

  - name: unzip the file
    unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes
  
  - name: install depencdiecs
    npm:
      path: /app
  
  - name: changes service file
    copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service
  
  - name: copy mongo repo
    copy: 
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  
  - name: install mongodb clint
    dnf:
      name: mongodb-mongosh
      state: present
  
  - name: check catalgir schmee
    command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: print the catalogue_output
    debug: "{{ catalogue_output }}"

  - name: load the products
    ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
    when: catalogue_output.stdout  | int < 0

  - name: start catalogue
    ansible.builtin.service:
      name: catalogue
      state: restarted
      enabled: yes